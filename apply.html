<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply Now</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      background:#fff;
      width:100%;
      max-width:500px;
      padding:40px;
      border-radius:14px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    h1{
      color:#ff6b00;
      margin-bottom:10px;
      text-align:center;
    }

    p{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    input,
    select,
    textarea{
      padding:14px;
      border:1px solid #ddd;
      border-radius:8px;
      font-size:15px;
      outline:none;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:#ff6b00;
    }

    button{
      background:#ff6b00;
      color:white;
      border:none;
      padding:14px;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e55d00;
    }

    .back{
      text-align:center;
      margin-top:20px;
    }

    .back a{
      color:#ff6b00;
      text-decoration:none;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Apply Now</h1>

    <p>Fill out the form below and our advisor will contact you shortly.</p>

    <form>

      <input type="text" placeholder="Full Name" required>

      <input type="tel" placeholder="Mobile Number" required>

      <input type="email" placeholder="Email Address">

      <select required>
        <option value="">Select Loan Type</option>
        <option>Education Loan</option>
        <option>Business Loan</option>
        <option>Personal Loan</option>
        <option>Home Loan / LAP</option>
        <option>Mortgage Loan</option>
      </select>

      <input type="number" placeholder="Required Loan Amount">

      <textarea rows="4" placeholder="Additional Details"></textarea>

      <button type="submit">Submit Application</button>

    </form>

    <div class="back">
      <a href="index.html">← Back to Home</a>
    </div>

  </div>

</body>
</html>
